<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something Interesting Coming Soon</title>
    <link rel="stylesheet" href="assets/vendor/bootstrap-icons/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #e0e0e0;
        }

        /* Subtle background gradient */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Main container */
        .container-coming {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: 40px 30px;
            animation: slideInUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Title */
        .title {
            font-size: clamp(2rem, 7vw, 4rem);
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            color: #ffffff;
            animation: fadeIn 1s ease-out 0.1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(0.95rem, 2.5vw, 1.3rem);
            font-weight: 400;
            margin-bottom: 45px;
            letter-spacing: 0.3px;
            color: #a0a0a0;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        /* Description */
        .description {
            font-size: 0.95rem;
            margin: 0 auto 50px;
            max-width: 550px;
            line-height: 1.7;
            color: #b0b0b0;
            font-weight: 300;
            letter-spacing: 0.2px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Countdown timer - Neumorphic */
        .countdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 15px;
            margin: 60px auto;
            max-width: 550px;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .countdown-item {
            background: #151b35;
            border-radius: 12px;
            padding: 25px 15px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: default;
            position: relative;
            
            /* Neumorphic effect */
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.05),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .countdown-item:hover {
            transform: translateY(-3px);
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.08),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .countdown-number {
            font-size: 2.2rem;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #808080;
            font-weight: 500;
        }

        /* CTA Buttons - Neumorphic */
        .cta-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .btn-custom {
            padding: 14px 40px;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            background: #151b35;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            
            /* Neumorphic effect */
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.05),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            color: #ffffff;
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.08),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .btn-custom:active {
            transform: translateY(0);
            box-shadow: 
                inset 1px 1px 3px rgba(0, 0, 0, 0.4),
                inset -1px -1px 3px rgba(255, 255, 255, 0.05),
                0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Social icons - Neumorphic */
        .social-icons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: #151b35;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0a0a0;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            
            /* Neumorphic effect */
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.05),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .social-icon:hover {
            transform: translateY(-2px);
            color: #ffffff;
            box-shadow: 
                inset 1px 1px 2px rgba(255, 255, 255, 0.08),
                inset -1px -1px 2px rgba(0, 0, 0, 0.3),
                0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .social-icon:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container-coming {
                padding: 30px 20px;
            }

            .title {
                font-size: 2rem;
                margin-bottom: 12px;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 35px;
            }

            .countdown {
                gap: 12px;
                margin: 45px auto;
            }

            .countdown-item {
                padding: 20px 12px;
            }

            .countdown-number {
                font-size: 1.8rem;
            }

            .countdown-label {
                font-size: 0.7rem;
            }

            .description {
                font-size: 0.9rem;
                margin-bottom: 40px;
            }

            .cta-buttons {
                gap: 10px;
                flex-direction: column;
                margin-bottom: 35px;
            }

            .btn-custom {
                width: 100%;
                padding: 12px 30px;
            }

            .social-icons {
                gap: 10px;
                margin-top: 25px;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container-coming">
        <h1 class="title">Something Interesting</h1>
        <h2 class="subtitle">Is Coming Soon</h2>

        <p class="description">
            We're crafting something extraordinary. A refined experience designed with precision and elegance. Your anticipation is appreciated.
        </p>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <div class="cta-buttons">
            <button class="btn-custom" onclick="notifyMe()">Notify Me</button>
            <button class="btn-custom" onclick="learnMore()">Learn More</button>
        </div>

        <div class="social-icons">
            <a href="https://twitter.com" class="social-icon" title="Twitter" target="_blank">
                <i class="bi bi-twitter"></i>
            </a>
            <a href="https://instagram.com" class="social-icon" title="Instagram" target="_blank">
                <i class="bi bi-instagram"></i>
            </a>
            <a href="https://linkedin.com" class="social-icon" title="LinkedIn" target="_blank">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="https://github.com" class="social-icon" title="GitHub" target="_blank">
                <i class="bi bi-github"></i>
            </a>
        </div>
    </div>

    <script>
        // Countdown Timer
        function startCountdown() {
            const launchDate = new Date('2026-12-31').getTime();

            function updateCountdown() {
                const now = new Date().getTime();
                const distance = launchDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

                if (distance < 0) {
                    clearInterval(countdownInterval);
                    document.querySelector('.countdown').innerHTML = '<div style="grid-column: 1/-1; color: #ffffff; font-size: 1.2rem; letter-spacing: 1px;">✓ We Are Live</div>';
                }
            }

            updateCountdown();
            const countdownInterval = setInterval(updateCountdown, 1000);
        }

        // Notify button
        function notifyMe() {
            const email = prompt('Enter your email to get notified:');
            if (email && email.includes('@')) {
                alert('Thank you. We\'ll notify you when we launch.');
            } else if (email) {
                alert('Please enter a valid email.');
            }
        }

        // Learn more button
        function learnMore() {
            alert('Something revolutionary is in development. Stay tuned.');
        }

        // Start countdown on page load
        window.addEventListener('load', startCountdown);
    </script>
</body>
</html>
